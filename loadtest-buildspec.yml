version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto11
    commands:
      - echo "Installing JMeter..."
      - export JMETER_VERSION=5.6.3
      - wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-$JMETER_VERSION.tgz || { echo "❌ Failed to download JMeter"; exit 1; }
      - tar -xzf apache-jmeter-$JMETER_VERSION.tgz
      - export PATH=$PATH:$PWD/apache-jmeter-$JMETER_VERSION/bin
      - echo "✅ JMeter installed successfully"

  pre_build:
    commands:
      - echo "Checking for Maven project..."
      - test -f pom.xml || { echo "❌ pom.xml not found"; exit 1; }
      - echo "Preparing load tests..."
      - mvn package -DskipTests || { echo "❌ Maven build failed"; exit 1; }
      - test -f target/*.jar || { echo "❌ JAR file not found in target"; exit 1; }
      - echo "✅ Application packaged. Starting app..."
      - nohup java -jar target/*.jar &
      - sleep 10
      - echo "✅ App started on port 8080"

  build:
    commands:
      - echo "Running load tests..."
      - test -f load-tests/test-plan.jmx || { echo "❌ JMeter test plan not found"; exit 1; }
      - jmeter -n -t load-tests/test-plan.jmx -l results.jtl -e -o report || { echo "❌ JMeter test failed"; exit 1; }
      - echo "Evaluating performance thresholds..."
      - python3 load-tests/evaluate_performance.py results.jtl || echo "⚠️ Performance evaluation script failed (continuing build)"

  post_build:
    commands:
      - echo "Load tests completed at `date`"
      - kill $(lsof -t -i:8080) || echo "⚠️ Failed to kill app on port 8080"

reports:
  jmeter-reports:
    files:
      - 'report/**/*'
    base-directory: '.'
    file-format: JMETERHTML

artifacts:
  files:
    - report/**/*
    - results.jtl
  discard-paths: no

